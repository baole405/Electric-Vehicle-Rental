name: React CI

on:
  pull_request:
    branches: [dev]

jobs:
  branch-status:
    name: branch-status
    runs-on: ubuntu-latest
    steps:
      - name: Verify PR branch naming convention
        shell: bash
        run: |
          echo "Base ref: ${{ github.base_ref }}"
          echo "Head ref: ${{ github.head_ref }}"
          BRANCH="${{ github.head_ref }}"
          if [ "${{ github.actor }}" = "dependabot[bot]" ]; then
            echo "Skipping branch name check for Dependabot."
            exit 0
          fi
          if echo "$BRANCH" | grep -Eq '^codex/[a-z0-9._-]+(/[a-z0-9._-]+)*$'; then
            echo "Branch name OK"
          else
            echo "::error::Branch '$BRANCH' must start with 'codex/' (e.g., codex/update-dependency or codex/feature/add-cool-thing)"
            exit 1
          fi
          if [[ "${{ github.base_ref }}" != "dev" ]]; then
            echo "::warning::PR base is '${{ github.base_ref }}', expected 'dev'."
          fi

  linter-run:
    name: linter-run
    runs-on: ubuntu-latest
    needs: branch-status
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npx nx affected:lint --base=origin/dev --head=HEAD

  tests-run:
    name: tests-run
    runs-on: ubuntu-latest
    needs: branch-status
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        env:
          CI: true
        run: npx nx affected:test --base=origin/dev --head=HEAD || echo "No tests to run"

  e2e-tests:
    name: e2e-tests
    runs-on: ubuntu-latest
    needs: branch-status
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run E2E tests
        env:
          CI: true
        run: npx nx affected:e2e --base=origin/dev --head=HEAD

  build:
    name: build
    runs-on: ubuntu-latest
    needs: [linter-run, tests-run, e2e-tests]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build affected projects
        run: npx nx affected:build --base=origin/dev --head=HEAD

      - name: Upload build artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: react-build
          path: |
            dist
            apps/*/dist
          if-no-files-found: ignore
